<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线答题 - 题库管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .quiz-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .progress-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .progress-info {
            font-size: 1.1em;
            font-weight: bold;
            color: #667eea;
        }
        
        .score-display {
            font-size: 1.2em;
            color: #4caf50;
            font-weight: bold;
        }
        
        .question-card {
            display: none;
        }
        
        .question-card.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }
        
        .question-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.3em;
        }
        
        .question-type {
            background: #e3f2fd;
            color: #1976d2;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1em;
            font-weight: bold;
        }
        
        .question-content {
            font-size: 1.3em;
            line-height: 2;
            color: #333;
            margin-bottom: 30px;
        }
        
        .answer-input-section {
            margin-top: 30px;
        }
        
        .answer-label {
            font-size: 1.1em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            display: block;
        }
        
        .answer-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .answer-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }
        
        .submit-answer-btn {
            margin-top: 15px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .submit-answer-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .result-section {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        
        .result-section.correct {
            background: #e8f5e9;
            border-left: 5px solid #4caf50;
            display: block;
        }
        
        .result-section.incorrect {
            background: #ffebee;
            border-left: 5px solid #f44336;
            display: block;
        }
        
        .result-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .correct .result-title {
            color: #4caf50;
        }
        
        .incorrect .result-title {
            color: #f44336;
        }
        
        .correct-answer {
            margin-top: 10px;
            font-size: 1.1em;
        }
        
        .answer-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .answer-tag {
            background: #ff9800;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 1em;
            display: inline-block;
        }
        
        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #4caf50 0%, #8bc34a 100%);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result-card {
            text-align: center;
            display: none;
        }
        
        .result-card.show {
            display: block;
        }
        
        .result-title {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .final-score {
            font-size: 4em;
            font-weight: bold;
            color: #4caf50;
            margin: 30px 0;
        }
        
        .score-details {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 30px;
        }
        
        .config-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .config-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .config-form {
            display: grid;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .form-group label {
            font-weight: bold;
            color: #555;
        }
        
        .form-group input, .form-group select {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }
        
        .start-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 在线答题</h1>
            <p>测试你的知识掌握程度</p>
        </div>
        
        <!-- 配置界面 -->
        <div class="config-section" id="config-section">
            <div class="config-title">⚙️ 答题配置</div>
            <div class="config-form">
                <div class="form-group">
                    <label>题目数量：</label>
                    <input type="number" id="question-count" value="10" min="1" max="50">
                </div>
                <div class="form-group">
                    <label>题型选择：</label>
                    <select id="question-type">
                        <option value="all">全部题型</option>
                        <option value="填空题">填空题</option>
                        <option value="选择题">选择题</option>
                        <option value="判断题">判断题</option>
                    </select>
                </div>
                <button class="start-btn" onclick="startQuiz()">开始答题</button>
            </div>
        </div>
        
        <!-- 答题区域 -->
        <div class="quiz-container" id="quiz-container" style="display: none;">
            <div class="progress-bar">
                <div class="progress-info">
                    进度：<span id="current-num">1</span> / <span id="total-num">10</span>
                </div>
                <div class="score-display">
                    得分：<span id="current-score">0</span>
                </div>
            </div>
            
            <div id="questions-wrapper">
                <!-- 题目将通过JavaScript动态生成 -->
            </div>
            
            <div class="result-card" id="result-card">
                <div class="result-title">🎉 答题完成！</div>
                <div class="final-score" id="final-score">0</div>
                <div class="score-details" id="score-details"></div>
                <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 20px;">
                    重新开始
                </button>
            </div>
            
            <div class="navigation" id="navigation">
                <button class="btn btn-secondary" id="prev-btn" onclick="previousQuestion()" disabled>
                    上一题
                </button>
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()">
                    下一题
                </button>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="/" class="btn btn-secondary" style="text-decoration: none;">返回首页</a>
        </div>
    </div>
    
    <script>
        let questions = [];
        let currentQuestion = 0;
        let score = 0;
        let answered = {};
        
        // 从后端加载题目
        async function loadQuestions() {
            try {
                const response = await fetch('/api/questions');
                const data = await response.json();
                return data.questions;
            } catch (error) {
                console.error('加载题目失败:', error);
                return [];
            }
        }
        
        function startQuiz() {
            const count = parseInt(document.getElementById('question-count').value);
            const type = document.getElementById('question-type').value;
            
            // 隐藏配置界面，显示答题区域
            document.getElementById('config-section').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            
            // 加载题目
            loadQuestions().then(allQuestions => {
                // 根据配置筛选题目
                if (type !== 'all') {
                    questions = allQuestions.filter(q => q.question_type === type);
                } else {
                    questions = allQuestions;
                }
                
                // 随机选择指定数量的题目
                questions = shuffleArray(questions).slice(0, count);
                
                document.getElementById('total-num').textContent = questions.length;
                
                // 渲染题目
                renderQuestions();
            });
        }
        
        function renderQuestions() {
            const wrapper = document.getElementById('questions-wrapper');
            wrapper.innerHTML = '';
            
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = `question-card ${index === 0 ? 'active' : ''}`;
                card.dataset.index = index;
                
                let html = `
                    <div class="question-header">
                        <span class="question-number">第 ${q.question_number} 题</span>
                        <span class="question-type">${q.question_type}</span>
                    </div>
                    <div class="question-content">${q.content}</div>
                `;
                
                // 如果是填空题或简答题，显示输入框
                if ((q.question_type === '填空题' || q.question_type === '简答题') && q.answer) {
                    const placeholder = q.question_type === '填空题' 
                        ? '在括号中填入正确答案...' 
                        : '请输入你的答案...';
                    
                    html += `
                        <div class="answer-input-section">
                            <label class="answer-label">${q.question_type === '填空题' ? '请填空（多个答案用顿号、分隔）：' : '请回答：'}</label>
                            <textarea 
                                class="answer-input" 
                                id="input-${index}" 
                                placeholder="${placeholder}"
                                rows="3"
                                style="resize: vertical;"
                            ></textarea>
                            <button class="submit-answer-btn" onclick="submitAnswer(${index})">
                                提交答案
                            </button>
                        </div>
                        <div class="result-section" id="result-${index}"></div>
                    `;
                } else {
                    html += `
                        <div class="result-section" id="result-${index}"></div>
                    `;
                }
                
                card.innerHTML = html;
                wrapper.appendChild(card);
            });
        }

        function submitAnswer(index) {
            const input = document.getElementById(`input-${index}`);
            const resultDiv = document.getElementById(`result-${index}`);
            const userAnswer = input.value.trim();
            
            if (!userAnswer) {
                alert('请先输入答案！');
                return;
            }
            
            const correctAnswer = questions[index].answer;
            const questionType = questions[index].question_type;
            const isCorrect = checkAnswer(userAnswer, correctAnswer, questionType);
            
            if (isCorrect) {
                score++;
                document.getElementById('current-score').textContent = score;
                resultDiv.className = 'result-section correct';
                resultDiv.innerHTML = `
                    <div class="result-title">✅ 回答正确！</div>
                `;
            } else {
                resultDiv.className = 'result-section incorrect';
                
                // 根据题型显示不同的提示
                let answerDisplay = '';
                if (questionType === '填空题') {
                    const answers = correctAnswer.split('、');
                    answerDisplay = `
                        <strong>正确答案：</strong>
                        <div class="answer-tags">
                            ${answers.map(a => `<span class="answer-tag">${a}</span>`).join('')}
                        </div>
                    `;
                } else {
                    answerDisplay = `
                        <strong>参考答案：</strong>
                        <div style="margin-top: 10px; padding: 10px; background: white; border-radius: 5px; line-height: 1.8;">
                            ${correctAnswer}
                        </div>
                    `;
                }
                
                resultDiv.innerHTML = `
                    <div class="result-title">❌ 回答错误</div>
                    <div class="correct-answer">
                        ${answerDisplay}
                    </div>
                `;
            }
            
            answered[index] = true;
            input.disabled = true;
        }
        
        function checkAnswer(userAnswer, correctAnswer, questionType) {
            // 填空题：标准化比较（忽略分隔符和空格）
            if (questionType === '填空题') {
                const normalize = (str) => {
                    return str.replace(/[、，,]/g, '').replace(/\s/g, '');
                };
                return normalize(userAnswer) === normalize(correctAnswer);
            }
            
            // 简答题：关键词匹配（更宽松的判断）
            if (questionType === '简答题') {
                // 提取用户答案和正确答案的关键词
                const userKeywords = extractKeywords(userAnswer);
                const correctKeywords = extractKeywords(correctAnswer);
                
                // 计算匹配度
                let matchCount = 0;
                correctKeywords.forEach(keyword => {
                    if (userKeywords.includes(keyword)) {
                        matchCount++;
                    }
                });
                
                // 如果匹配到30%以上的关键词，认为答对了
                const matchRate = matchCount / correctKeywords.length;
                return matchRate >= 0.3;
            }
            
            // 其他题型：精确匹配
            return userAnswer === correctAnswer;
        }
        
        function extractKeywords(text) {
            // 简单的关键词提取：去除标点符号，分割成词语
            return text
                .replace(/[，。？！、；：""''（）《》【】\s]/g, '')
                .split('')
                .filter(c => c.length > 0);
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion(currentQuestion);
            } else {
                showResult();
            }
        }
        
        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        }
        
        function showQuestion(index) {
            document.querySelectorAll('.question-card').forEach(card => {
                card.classList.remove('active');
            });
            document.querySelector(`[data-index="${index}"]`).classList.add('active');
            
            document.getElementById('current-num').textContent = index + 1;
            document.getElementById('prev-btn').disabled = index === 0;
            document.getElementById('next-btn').textContent = 
                index === questions.length - 1 ? '查看结果' : '下一题';
        }
        
        function showResult() {
            document.querySelectorAll('.question-card').forEach(card => {
                card.classList.remove('active');
            });
            document.getElementById('result-card').classList.add('show');
            document.getElementById('navigation').style.display = 'none';
            document.getElementById('final-score').textContent = 
                `${score} / ${questions.length}`;
            document.getElementById('score-details').textContent = 
                `正确率：${(score / questions.length * 100).toFixed(1)}%`;
        }
        
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }
        
        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('quiz-container').style.display === 'none') {
                return;
            }
            
            if (e.key === 'ArrowRight') {
                nextQuestion();
            } else if (e.key === 'ArrowLeft') {
                previousQuestion();
            }
        });
    </script>
</body>
</html>
